<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#06b6d4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Xylocopa" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Xylocopa</title>
    <script>
      // Reload tracing + vite-HMR-reload suppression.
      // Installed BEFORE any ES module loads so we intercept vite client's
      // location.reload() on HMR ws reconnect (which causes PWA white-screen
      // refresh on iOS when the HMR socket flaps).  Other reload sources
      // (user "Retry" buttons, ErrorBoundary, etc.) are logged but allowed.
      (function(){
        try {
          var origReload = window.location.reload.bind(window.location);
          var beacon = function(payload){
            try {
              var body = JSON.stringify(Object.assign({ts: Date.now(), path: location.pathname}, payload));
              if (navigator.sendBeacon) {
                navigator.sendBeacon("/api/debug/auth-diag", new Blob([body], {type:"application/json"}));
              } else {
                fetch("/api/debug/auth-diag", {method:"POST", headers:{"Content-Type":"application/json"}, body: body, keepalive: true});
              }
            } catch(_){}
          };
          Object.defineProperty(window.location, "reload", {
            value: function(){
              var stack = (new Error().stack || "");
              var isVite = /@vite\/client|@vite\/env|vite\/dist\/client/.test(stack);
              beacon({action:"reload-trace", reason:"location.reload", stack: stack.slice(0,1500), isVite: isVite});
              if (isVite) {
                console.warn("[reload-probe] suppressed vite-originated reload");
                return;
              }
              return origReload.apply(window.location, arguments);
            },
            writable: true,
            configurable: true,
          });
          beacon({action:"reload-trace", reason:"patch-installed"});
        } catch(e) {
          try {
            navigator.sendBeacon && navigator.sendBeacon(
              "/api/debug/auth-diag",
              new Blob([JSON.stringify({action:"reload-trace", reason:"patch-failed", error: String(e), ts: Date.now(), path: location.pathname})], {type:"application/json"})
            );
          } catch(_){}
        }
      })();
    </script>
    <script>
      (function(){
        // Force-clear stale PWA caches — bump version to trigger
        var CV="v3";
        if(navigator.serviceWorker&&!localStorage.getItem("ah-cv-"+CV)){
          navigator.serviceWorker.getRegistrations().then(function(regs){
            var p=regs.map(function(r){return r.unregister()});
            return Promise.all(p);
          }).then(function(){return caches.keys()}).then(function(ns){
            return Promise.all(ns.map(function(n){return caches.delete(n)}));
          }).then(function(){
            localStorage.setItem("ah-cv-"+CV,"1");
            location.reload();
          }).catch(function(){});
          return; // stop further init until reload
        }
        // Theme init — read new key, fall back to legacy "agenthive-theme"
        var s=localStorage.getItem("xylocopa-theme")||localStorage.getItem("agenthive-theme");
        var d=window.matchMedia("(prefers-color-scheme:dark)").matches;
        if(s==="dark"||(s!=="light"&&d)){
          document.documentElement.classList.add("dark");
          document.querySelector('meta[name="theme-color"]').setAttribute("content","#030712");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
